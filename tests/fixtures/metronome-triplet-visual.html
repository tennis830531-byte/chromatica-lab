<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body { margin: 0; padding: 32px; }
    #comparison { display: grid; grid-template-columns: repeat(2, 160px); gap: 24px; }
    .sample { display: grid; gap: 12px; }
    #result { white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="compactHost" class="metronome-stage">
    <div class="metronome-stage-selectors">
      <button id="metronomeRhythmOpen" type="button">
        <span>細分</span>
        <strong id="metronomeRhythmPreview"></strong>
        <i aria-hidden="true">⌄</i>
      </button>
    </div>
  </div>
  <div id="comparison">
    <div id="before" class="sample"></div>
    <div id="after" class="sample"></div>
  </div>
  <pre id="result"></pre>
  <script>
    const patterns = {
      quarter: { stepCount: 1, hits: [1], group: "quarter" },
      eighth: { stepCount: 2, hits: [1, 1], group: "eighth" },
      triplet: { stepCount: 3, hits: [1, 1, 1], group: "triplet" },
      sixteenth: { stepCount: 4, hits: [1, 1, 1, 1], group: "sixteenth" },
    };
    const digitPath = "M4 4.2C6.1 2.2 8.7 1.2 12 1.2c4.4 0 7.4 2.4 7.4 6 0 2.4-1.2 4.1-3.6 5.1 2.6 1 4 3 4 5.6 0 4.4-3.5 7-8.1 7-3.7 0-6.8-1.3-8.9-3.8l3.4-4c1.5 1.6 3.3 2.4 5.2 2.4 2 0 3.1-.8 3.1-2.1 0-1.5-1.3-2.2-4-2.2H8.2v-4.7h2.4c2.4 0 3.6-.7 3.6-2.1 0-1.3-1.1-2-2.8-2-1.6 0-3.2.7-4.6 1.9Z";

    function notation(pattern, { compact = false, glyphY = -14.25 } = {}) {
      const width = compact ? 88 : 120;
      const left = compact ? 16 : 18;
      const right = width - left;
      const stepGap = pattern.stepCount > 1 ? (right - left) / (pattern.stepCount - 1) : 0;
      const positions = Array.from({ length: pattern.stepCount }, (_, index) => left + stepGap * index);
      const noteY = compact ? 29 : 32;
      const stemTop = compact ? 12 : 13;
      const notes = positions.map((x) => `<g class="rhythm-note"><ellipse cx="${x}" cy="${noteY}" rx="5" ry="3.8" transform="rotate(-18 ${x} ${noteY})"></ellipse><path d="M ${x + 4} ${noteY - 1} V ${stemTop}"></path></g>`).join("");
      const beamCount = pattern.group === "sixteenth" ? 2 : pattern.stepCount > 1 ? 1 : 0;
      const beams = beamCount ? Array.from({ length: beamCount }, (_, index) => `<path class="rhythm-beam" d="M ${positions[0] + 4} ${stemTop + index * 5} H ${positions.at(-1) + 4}"></path>`).join("") : "";
      const triplet = pattern.group === "triplet" ? `<path class="rhythm-tuplet" d="M ${left - 3} 7 H ${right + 5}"></path><svg class="rhythm-triplet-glyph" x="${Math.round(width / 2 - 9)}" y="${glyphY}" width="18" height="18" viewBox="-3 -2 30 30"><path d="${digitPath}" fill="#724523" stroke="#fffaf2" stroke-width="1.25" stroke-linejoin="round" stroke-linecap="round" paint-order="stroke fill" vector-effect="non-scaling-stroke"></path></svg>` : "";
      return `<svg class="rhythm-notation${compact ? " compact" : ""}" data-pattern="${pattern.group}" viewBox="0 0 ${width} 44">${triplet}${beams}${notes}</svg>`;
    }

    for (const [name, pattern] of Object.entries(patterns)) {
      before.insertAdjacentHTML("beforeend", notation(pattern, { glyphY: -1 }));
      after.insertAdjacentHTML("beforeend", notation(pattern));
    }
    metronomeRhythmPreview.innerHTML = notation(patterns.triplet, { compact: true });

    const round = (value) => Math.round(value * 1000) / 1000;
    const relativeBox = (element, outer) => {
      const box = element.getBoundingClientRect();
      const root = outer.getBoundingClientRect();
      return { x: round(box.x - root.x), y: round(box.y - root.y), width: round(box.width), height: round(box.height) };
    };
    const patternBoxes = (root, name) => {
      const outer = root.querySelector(`[data-pattern="${name}"]`);
      return {
        outer: relativeBox(outer, outer),
        notes: [...outer.querySelectorAll(".rhythm-note")].map((node) => relativeBox(node, outer)),
        beams: [...outer.querySelectorAll(".rhythm-beam")].map((node) => relativeBox(node, outer)),
        line: outer.querySelector(".rhythm-tuplet") ? relativeBox(outer.querySelector(".rhythm-tuplet"), outer) : null,
      };
    };
    function tripletMetrics(outer) {
      const glyph = outer.querySelector(".rhythm-triplet-glyph");
      const digit = glyph.querySelector("path");
      const line = outer.querySelector(".rhythm-tuplet");
      const outerBox = outer.getBoundingClientRect();
      const digitBox = digit.getBoundingClientRect();
      const lineBox = line.getBBox();
      const lineMatrix = line.getScreenCTM();
      const lineY = new DOMPoint(0, lineBox.y).matrixTransform(lineMatrix).y;
      const lineScaleY = Math.hypot(lineMatrix.c, lineMatrix.d);
      const lineTop = lineY - Number.parseFloat(getComputedStyle(line).strokeWidth) * lineScaleY / 2;
      const digitBottom = digitBox.bottom + Number.parseFloat(getComputedStyle(digit).strokeWidth) / 2;
      const clippingAncestors = [];
      for (let node = glyph.parentElement; node && node !== document.body; node = node.parentElement) {
        const style = getComputedStyle(node);
        const clips = [style.overflow, style.overflowX, style.overflowY].some((value) => value === "hidden" || value === "clip");
        if (clips) {
          const box = node.getBoundingClientRect();
          if (digitBox.top < box.top || digitBottom > box.bottom) clippingAncestors.push(node.id || node.className || node.tagName);
        }
      }
      return {
        glyphY: glyph.getAttribute("y"),
        glyphWidth: glyph.getAttribute("width"),
        glyphHeight: glyph.getAttribute("height"),
        paintedDigitBottom: round(digitBottom - outerBox.top),
        paintedLineTop: round(lineTop - outerBox.top),
        gap: round(lineTop - digitBottom),
        glyphOverflow: getComputedStyle(glyph).overflow,
        outerOverflow: getComputedStyle(outer).overflow,
        clippingAncestors,
      };
    }

    const result = {
      after: tripletMetrics(after.querySelector('[data-pattern="triplet"]')),
      compact: tripletMetrics(metronomeRhythmPreview.querySelector('[data-pattern="triplet"]')),
      beforeTriplet: patternBoxes(before, "triplet"),
      afterTriplet: patternBoxes(after, "triplet"),
      unchanged: Object.fromEntries(["quarter", "eighth", "sixteenth"].map((name) => [name, {
        before: patternBoxes(before, name),
        after: patternBoxes(after, name),
      }])),
    };
    result.beforeTripletGlyph = tripletMetrics(before.querySelector('[data-pattern="triplet"]'));
    document.querySelector("#result").textContent = JSON.stringify(result);
  </script>
</body>
</html>
